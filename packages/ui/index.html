<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>条码布局设计器 | 开源组件</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #f1f5f9;
      }

      #app {
        width: 100%;
        height: 100vh;
      }
    </style>
  </head>

  <body>
    <div id="app"></div>

    <script type="module">
      import { QRLayoutDesigner } from "/src/index.ts";

      // Example Entity Schemas
      const schemas = {
        employee: {
          label: "员工",
          fields: [
            { name: "name", label: "姓名" },
            { name: "employeeId", label: "工号" },
            { name: "designation", label: "职位" },
            { name: "place", label: "工作地点" },
            { name: "bloodGroup", label: "血型" },
          ],
          sampleData: {
            name: "张三",
            employeeId: "EMP-101",
            designation: "软件工程师",
            place: "北京",
          },
        },
        product: {
          label: "产品",
          fields: [
            { name: "title", label: "产品名称" },
            { name: "sku", label: "SKU 编号" },
            { name: "price", label: "价格" },
          ],
          sampleData: {
            title: "无线鼠标",
            sku: "WM-889",
            price: "¥169.00",
          },
        },
      };

      // Example Initial Layout
      const initialLayout = {
        id: "layout-demo",
        name: "演示工牌",
        targetEntity: "employee",
        width: 100, // Number, not string
        height: 60,
        unit: "mm",
        backgroundColor: "#ffffff",
        elements: [
          {
            id: "t1",
            type: "text",
            x: 5,
            y: 5,
            w: 90,
            h: 8,
            content: "员工工牌",
            style: { textAlign: "center", fontWeight: "bold" },
          },
          {
            id: "q1",
            type: "qr",
            x: 35,
            y: 15,
            w: 30,
            h: 30,
            content: "{{employeeId}}",
          },
          {
            id: "t2",
            type: "text",
            x: 5,
            y: 48,
            w: 90,
            h: 8,
            content: "{{name}}",
            style: { textAlign: "center" },
          },
        ],
      };

      const app = document.getElementById("app");
      const designer = new QRLayoutDesigner({
        element: app,
        entitySchemas: schemas,
        initialLayout: initialLayout,
        onSave: (layout) => {
          console.log("已保存布局:", layout);
          alert("布局已保存！请查看控制台。");
        },
      });
    </script>
  </body>
</html>
